<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bipbip – Secrétaire numérique pour malvoyants</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>* { box-sizing: border-box; } body { margin: 0; padding: 0; background: #fff; font-family: Arial, sans-serif; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const PROFILE_FIELDS = [
  { key:"firstName",     label:"Prénom" },
  { key:"lastName",      label:"Nom" },
  { key:"birthDate",     label:"Date de naissance" },
  { key:"birthPlace",    label:"Lieu de naissance" },
  { key:"address",       label:"Adresse" },
  { key:"postalCode",    label:"Code postal" },
  { key:"city",          label:"Ville" },
  { key:"email",         label:"Email" },
  { key:"phone",         label:"Téléphone" },
  { key:"secu",          label:"Numéro de sécurité sociale" },
  { key:"nationality",   label:"Nationalité" },
  { key:"maritalStatus", label:"Situation familiale" },
];

function loadLS(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } }
function saveLS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

const initialState = {
  apiKey:          loadLS("bipbip_apikey",""),
  apiKeyValidated: !!loadLS("bipbip_apikey",""),
  profiles:        loadLS("bipbip_profiles",[]),
  activeIdx:       0,
  history:         loadLS("bipbip_history",[]),
  view:            loadLS("bipbip_apikey","") ? "home" : "apikey",
  previewEntry:    null,
};

function App(){
  const [app,setApp]         = useState(initialState);
  const [liveMsg,setLiveMsg] = useState("");
  const announce = useCallback(msg=>{ setLiveMsg(""); setTimeout(()=>setLiveMsg(msg),50); },[]);
  const setView  = v => setApp(a=>({...a,view:v}));

  const updateProfiles = (profiles,activeIdx) => {
    saveLS("bipbip_profiles",profiles);
    setApp(a=>({...a,profiles,activeIdx:activeIdx??a.activeIdx}));
  };
  const addHistory = entry => setApp(a=>{ const h=[entry,...a.history]; saveLS("bipbip_history",h); return {...a,history:h}; });
  const updateProfileAtIdx = (idx,profile) => setApp(a=>{ const p=[...a.profiles]; p[idx]=profile; saveLS("bipbip_profiles",p); return {...a,profiles:p}; });
  const saveApiKey = key => { saveLS("bipbip_apikey",key); setApp(a=>({...a,apiKey:key,apiKeyValidated:true,view:a.profiles.length===0?"profile":"home"})); };
  const openPreview = entry => setApp(a=>({...a,view:"preview",previewEntry:entry}));
  const {view,profiles,activeIdx,history,previewEntry,apiKey} = app;
  const activeProfile = profiles[activeIdx]||null;

  if(view==="apikey")  return <ApiKeyView onSave={saveApiKey} liveMsg={liveMsg} announce={announce}/>;
  if(view==="home")    return <HomeView setView={setView} profiles={profiles} activeIdx={activeIdx} setActiveIdx={i=>setApp(a=>({...a,activeIdx:i}))} liveMsg={liveMsg} onChangeKey={()=>setApp(a=>({...a,view:"apikey",apiKeyValidated:false}))}/>;
  if(view==="profile") return <ProfileView profiles={profiles} activeIdx={activeIdx} updateProfiles={updateProfiles} setView={setView} liveMsg={liveMsg} announce={announce}/>;
  if(view==="history") return <HistoryView history={history} setView={setView} openPreview={openPreview} liveMsg={liveMsg}/>;
  if(view==="preview") return <PreviewView entry={previewEntry} setView={setView} liveMsg={liveMsg}/>;
  return <FormView activeProfile={activeProfile} activeIdx={activeIdx} apiKey={apiKey} setView={setView} updateProfileAtIdx={updateProfileAtIdx} addHistory={addHistory} liveMsg={liveMsg} announce={announce}/>;
}

// ─── API KEY ──────────────────────────────────────────────────────────────────
function ApiKeyView({onSave,liveMsg,announce}){
  const [key,setKey]         = useState("");
  const [error,setError]     = useState("");
  const [testing,setTesting] = useState(false);

  const validate = async () => {
    const trimmed = key.trim();
    if(!trimmed.startsWith("sk-ant-")){ setError("La clé doit commencer par sk-ant-... Vérifiez que vous avez bien tout copié."); announce("Erreur : clé invalide."); return; }
    setTesting(true); setError(""); announce("Vérification en cours...");
    try{
      const res = await fetch("/api/chat",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({apiKey:trimmed,messages:[{role:"user",content:"ok"}]}) });
      if(res.ok){ announce("Clé validée ! Bienvenue !"); onSave(trimmed); }
      else{ const e=await res.json().catch(()=>({})); setError(`Clé refusée : ${e?.error?.message||"vérifiez qu'elle est correcte et active."}`); announce("Erreur : clé refusée."); }
    }catch{ setError("Impossible de vérifier la clé. Vérifiez votre connexion."); announce("Erreur de connexion."); }
    setTesting(false);
  };

  return(
    <div style={s.container}>
      <LiveRegion msg={liveMsg}/>
      <Header title="Bipbip" subtitle="Votre secrétaire numérique pour formulaires PDF"/>
      <main style={s.main}>
        <section aria-labelledby="ak-title" style={s.section}>
          <h2 id="ak-title" style={s.h2}>Bienvenue !</h2>
          <p style={s.hint}>Pour fonctionner, cette application a besoin de votre clé API Anthropic personnelle. Elle reste uniquement sur votre appareil.</p>
          <div style={s.infoBox} role="note">
            <p style={{margin:"0 0 8px",fontWeight:"bold",fontSize:18}}>📋 Vous n'avez pas encore de clé API ?</p>
            <ol style={{margin:0,paddingLeft:22,lineHeight:2.2,fontSize:17}}>
              <li>Allez sur <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={s.link}>console.anthropic.com</a></li>
              <li>Créez un compte gratuit — bouton <strong>"Sign up"</strong></li>
              <li>Dans le menu à gauche, cliquez sur <strong>"API Keys"</strong></li>
              <li>Cliquez sur <strong>"Create Key"</strong>, nommez-la, copiez-la</li>
            </ol>
            <p style={{margin:"14px 0 0",color:"#444",fontSize:16}}>💡 <a href="https://www.anthropic.com/pricing" target="_blank" rel="noreferrer" style={s.link}>Voir les tarifs →</a></p>
          </div>
          <div style={s.formRow}>
            <label htmlFor="api-key-input" style={s.label}>Collez votre clé API ici :</label>
            <input id="api-key-input" type="password" value={key} onChange={e=>setKey(e.target.value)} style={s.input} placeholder="sk-ant-api03-..." aria-describedby="ak-hint ak-error" autoComplete="off"/>
            <p id="ak-hint" style={s.hint}>Stockée uniquement sur votre appareil, jamais partagée.</p>
            {error && <p id="ak-error" role="alert" style={s.errorMsg}>{error}</p>}
          </div>
          <button style={key.trim()?s.btnPrimary:s.btnDisabled} onClick={validate} disabled={!key.trim()||testing} aria-busy={testing}>
            {testing?"Vérification...":"Valider ma clé et commencer"}
          </button>
        </section>
      </main>
    </div>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function HomeView({setView,profiles,activeIdx,setActiveIdx,liveMsg,onChangeKey}){
  return(
    <div style={s.container}>
      <LiveRegion msg={liveMsg}/>
      <Header title="Bipbip" subtitle="Votre secrétaire numérique pour formulaires PDF"/>
      <main style={s.main}>
        <nav aria-label="Actions principales" style={s.homeNav}>
          {[{icon:"📄",label:"Remplir un formulaire",view:"form"},{icon:"👤",label:"Mon profil",view:"profile"},{icon:"📁",label:"Historique",view:"history"}].map(btn=>(
            <button key={btn.view} style={s.homeBtn} onClick={()=>setView(btn.view)}>
              <span aria-hidden="true" style={s.homeBtnIcon}>{btn.icon}</span>{btn.label}
            </button>
          ))}
        </nav>
        {profiles.length>1&&(
          <section aria-labelledby="sw-lbl" style={s.section}>
            <h2 id="sw-lbl" style={s.h2}>Profil actif</h2>
            <label htmlFor="profile-sel" style={s.label}>Choisir un profil :</label>
            <select id="profile-sel" value={activeIdx} onChange={e=>setActiveIdx(Number(e.target.value))} style={s.input}>
              {profiles.map((p,i)=><option key={p.id} value={i}>{p.firstName} {p.lastName}</option>)}
            </select>
          </section>
        )}
        <section style={{...s.section,borderBottom:"none"}}>
          <button style={s.btnSecondary} onClick={onChangeKey}>🔑 Changer ma clé API</button>
        </section>
      </main>
    </div>
  );
}

// ─── PROFILE ─────────────────────────────────────────────────────────────────
function ProfileView({profiles,activeIdx,updateProfiles,setView,liveMsg,announce}){
  const [editIdx,setEditIdx] = useState(activeIdx);
  const [form,setForm]       = useState(()=>profiles[activeIdx]?{...profiles[activeIdx]}:{id:Date.now()});
  const isNew = editIdx>=profiles.length;
  const set   = (k,v)=>setForm(f=>({...f,[k]:v}));

  const save = ()=>{
    const updated=[...profiles];
    if(isNew) updated.push(form); else updated[editIdx]=form;
    updateProfiles(updated,isNew?updated.length-1:editIdx);
    if(isNew) setEditIdx(updated.length-1);
    announce("Profil sauvegardé.");
  };

  const handleSig = e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{ set("signature",ev.target.result); set("sigName",file.name); announce("Signature chargée."); };
    reader.readAsDataURL(file);
  };

  return(
    <div style={s.container}>
      <LiveRegion msg={liveMsg}/>
      <Header title="Mon profil" back={{label:"← Accueil",action:()=>setView("home")}}/>
      <main style={s.main}>
        {profiles.length>0&&(
          <section aria-labelledby="sel-lbl" style={s.section}>
            <h2 id="sel-lbl" style={s.h2}>Profils enregistrés</h2>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {profiles.map((p,i)=>(
                <button key={p.id} style={editIdx===i&&!isNew?s.btnPrimary:s.btnSecondary} onClick={()=>{ setEditIdx(i); setForm({...profiles[i]}); }}>
                  {p.firstName||"Sans nom"} {p.lastName}
                </button>
              ))}
              <button style={s.btnSecondary} onClick={()=>{ setEditIdx(profiles.length); setForm({id:Date.now()}); }}>+ Nouveau profil</button>
            </div>
          </section>
        )}
        <section aria-labelledby="ed-lbl" style={s.section}>
          <h2 id="ed-lbl" style={s.h2}>{isNew?"Nouveau profil":"Modifier le profil"}</h2>
          {PROFILE_FIELDS.map(f=>(
            <div key={f.key} style={s.formRow}>
              <label htmlFor={`pf-${f.key}`} style={s.label}>{f.label}</label>
              <input id={`pf-${f.key}`} type="text" value={form[f.key]||""} onChange={e=>set(f.key,e.target.value)} style={s.input}/>
            </div>
          ))}
          <div style={s.formRow}>
            <label htmlFor="sig-up" style={s.label}>Signature (image PNG ou JPG)</label>
            <label htmlFor="sig-up" style={s.fileLabel}>Choisir ma signature<input id="sig-up" type="file" accept="image/*" onChange={handleSig} style={s.fileInput}/></label>
            {form.sigName&&<p style={s.success}>✓ {form.sigName}</p>}
            {form.signature&&<img src={form.signature} alt="Aperçu signature" style={{maxHeight:60,marginTop:8,border:"1px solid #ccc",display:"block"}}/>}
          </div>
          <button style={s.btnPrimary} onClick={save}>Enregistrer le profil</button>
        </section>
      </main>
    </div>
  );
}

// ─── FORM ─────────────────────────────────────────────────────────────────────
function FormView({activeProfile,activeIdx,apiKey,setView,updateProfileAtIdx,addHistory,liveMsg,announce}){
  const [pdfFile,setPdfFile]         = useState(null);
  const [pdfBytes,setPdfBytes]       = useState(null);
  const [pdfText,setPdfText]         = useState("");
  const [pdfType,setPdfType]         = useState("");
  const [processing,setProcessing]   = useState(false);
  const [filledData,setFilledData]   = useState(null);
  const [questions,setQuestions]     = useState([]);
  const [answers,setAnswers]         = useState({});
  const [editingQ,setEditingQ]       = useState(null);
  const [remarks,setRemarks]         = useState("");
  const [step,setStep]               = useState("upload"); // upload|questions|preview|pdfview|done
  const [status,setStatus]           = useState("");
  const [pdfWarning,setPdfWarning]   = useState("");
  const [previewUrl,setPreviewUrl]   = useState(null);

  const loadPdfLib = async()=>{
    if(!window.PDFLib){
      await new Promise((res,rej)=>{ const sc=document.createElement("script"); sc.src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"; sc.onload=res; sc.onerror=rej; document.head.appendChild(sc); });
    }
    return window.PDFLib;
  };

  const loadPdfJs = async()=>{
    if(!window.pdfjsLib){
      await new Promise((res,rej)=>{ const sc=document.createElement("script"); sc.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"; sc.onload=res; sc.onerror=rej; document.head.appendChild(sc); });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
    return window.pdfjsLib;
  };

  const handlePdfUpload = async e=>{
    const file=e.target.files[0]; if(!file) return;
    setPdfFile(file); setFilledData(null); setQuestions([]); setAnswers({}); setRemarks(""); setStep("upload"); setPdfWarning(""); setStatus("Lecture du PDF..."); announce("Lecture du PDF en cours.");
    const reader=new FileReader();
    reader.onload=async ev=>{
      const bytes=new Uint8Array(ev.target.result);
      setPdfBytes(bytes);
      // Detect PDF type
      try{
        const PDFLib=await loadPdfLib();
        const pdfDoc=await PDFLib.PDFDocument.load(bytes,{ignoreEncryption:true});
        const form=pdfDoc.getForm();
        const fields=form.getFields();
        if(fields.length>0){ setPdfType("fields"); setStatus(`PDF avec ${fields.length} champ(s) interactif(s) détecté. Prêt !`); announce("PDF remplissable détecté."); }
        else{
          // Try to extract text
          const pdfjs=await loadPdfJs();
          const doc=await pdfjs.getDocument({data:bytes}).promise;
          let text="";
          for(let i=1;i<=doc.numPages;i++){ const pg=await doc.getPage(i); const c=await pg.getTextContent(); text+=c.items.map(it=>it.str).join(" ")+"\n"; }
          text=text.trim();
          if(text.length>50){ setPdfType("text"); setPdfText(text); setStatus("PDF texte détecté. Prêt !"); announce("PDF texte détecté."); }
          else{ setPdfType("image"); setPdfText("PDF image/scan — analyse visuelle."); setStatus("PDF image/scan détecté. Prêt !"); announce("PDF image détecté."); }
        }
      }catch{ setPdfType("unknown"); setStatus("PDF chargé. Prêt !"); announce("PDF chargé."); }
    };
    reader.readAsArrayBuffer(file);
  };

  const callClaude = async prompt=>{
    const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    return data.content?.map(b=>b.text||"").join("")||"";
  };

  const analyze = async(correctionNote="")=>{
    if(!pdfFile||!activeProfile) return;
    setProcessing(true); setStatus("Au boulot !..."); announce("Analyse en cours, veuillez patienter.");
    const profileStr=PROFILE_FIELDS.map(f=>`${f.label}: ${activeProfile[f.key]||"(non renseigné)"}`).join("\n");
    const answersStr=Object.keys(answers).length>0 ? "\nRÉPONSES DÉJÀ FOURNIES :\n"+questions.map(q=>`${q.field}: ${answers[q.id]||"non renseigné"}`).join("\n") : "";
    const prompt=`Tu es une secrétaire aidant une personne non-voyante à remplir un formulaire administratif.

PROFIL :
${profileStr}
${answersStr}

FORMULAIRE PDF (texte extrait) :
${pdfText||"PDF image — localise les zones de saisie visuellement."}
${correctionNote?`\nCORRECTIONS ET REMARQUES : ${correctionNote}`:""}

Détecte la langue du formulaire et réponds dans cette langue pour les questions.
Mention "Lu et approuvé" selon la langue : français="Lu et approuvé", anglais="Read and approved", espagnol="Leído y aprobado", roumain="Citit și aprobat".

Réponds UNIQUEMENT en JSON valide sans markdown :
{
  "language": "fr",
  "summary": "résumé court",
  "filled": [{"field":"nom du champ","value":"valeur","source":"profil","x":null,"y":null,"page":1}],
  "questions": [{"id":"q1","field":"nom du champ","question":"question","type":"text","options":[]}],
  "signatureField": {"page":1,"x":400,"y":100},
  "luApprouveField": {"page":1,"x":400,"y":130},
  "needsSignature": true,
  "needsLuApprouve": true
}
Règles :
- "radio" pour choix multiples avec options, "text" pour champs libres avec options:[]
- Ne devine pas les cases à cocher
- x,y sont les coordonnées approximatives en points PDF (origine bas-gauche). Mettre null si inconnu.
- options doit toujours être présent, [] si vide`;

    try{
      const raw=await callClaude(prompt);
      const clean=raw.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setFilledData(parsed);
      // Merge new questions with existing answers
      const newQ=parsed.questions||[];
      setQuestions(newQ);
      const msg=`Terminé ! ${parsed.filled?.length||0} champs remplis. ${newQ.length} question(s).`;
      setStatus(msg); announce(msg);
      setStep(newQ.length>0?"questions":"preview");
    }catch{ setStatus("Erreur d'analyse. Réessayez."); announce("Erreur lors de l'analyse."); }
    setProcessing(false);
  };

  const allAnswered = questions.every(q=>(answers[q.id]||"").trim()!=="");

  const goToPreview = ()=>{ setStep("preview"); announce("Prévisualisation du document. Vérifiez les informations."); };

  const buildPdfBytes = async()=>{
    if(!pdfBytes||!filledData) return null;
    const PDFLib=await loadPdfLib();
    const {PDFDocument,rgb,StandardFonts}=PDFLib;
    const pdfDoc=await PDFDocument.load(pdfBytes,{ignoreEncryption:true});
    const font=await pdfDoc.embedFont(StandardFonts.Helvetica);
    const pages=pdfDoc.getPages();
    const allFields=[
      ...(filledData.filled||[]),
      ...questions.map(q=>({field:q.field,value:answers[q.id]||"",source:"utilisateur",x:null,y:null,page:1}))
    ];
    if(pdfType==="fields"){
      try{
        const form=pdfDoc.getForm();
        for(const f of allFields){
          try{ const field=form.getTextField(f.field); if(field) field.setText(f.value); }
          catch{ const allF=form.getFields(); const match=allF.find(ff=>ff.getName().toLowerCase().includes(f.field.toLowerCase().substring(0,8))); if(match&&match.constructor.name==="PDFTextField") match.setText(f.value); }
        }
      }catch{}
    } else {
      for(const f of allFields){
        if(!f.value||f.x===null) continue;
        const page=pages[(f.page||1)-1]||pages[0];
        const {height}=page.getSize();
        try{ page.drawText(String(f.value).substring(0,60),{x:f.x,y:height-(f.y||100),size:10,font,color:rgb(0,0,0)}); }catch{}
      }
      const luMap={fr:"Lu et approuvé",en:"Read and approved",es:"Leído y aprobado",ro:"Citit și aprobat"};
      if(filledData.needsLuApprouve){
        const lf=filledData.luApprouveField;
        const page=pages[(lf?.page||1)-1]||pages[0];
        const {height}=page.getSize();
        page.drawText(luMap[filledData.language||"fr"]||"Lu et approuvé",{x:lf?.x||50,y:lf?.y??(height-700),size:11,font,color:rgb(0,0,0)});
      }
    }
    if(filledData.needsSignature&&activeProfile?.signature){
      try{
        const sigBytes=Uint8Array.from(atob(activeProfile.signature.split(",")[1]),c=>c.charCodeAt(0));
        const mime=(activeProfile.signature.match(/data:(image\/\w+);/)||[])[1]||"image/png";
        const sigImg=mime.includes("jp")?await pdfDoc.embedJpg(sigBytes):await pdfDoc.embedPng(sigBytes);
        const sf=filledData.signatureField;
        const page=pages[(sf?.page||1)-1]||pages[0];
        const {height}=page.getSize();
        const dims=sigImg.scale(0.25);
        page.drawImage(sigImg,{x:sf?.x||400,y:sf?.y??(height-700),width:dims.width,height:dims.height});
      }catch{}
    }
    return await pdfDoc.save();
  };

  const showPreviewPdf = async()=>{
    setProcessing(true); setStatus("Génération de la prévisualisation..."); announce("Prévisualisation en cours.");
    try{
      const finalBytes=await buildPdfBytes();
      if(!finalBytes){ setStatus("Erreur de génération."); setProcessing(false); return; }
      if(previewUrl) URL.revokeObjectURL(previewUrl);
      const blob=new Blob([finalBytes],{type:"application/pdf"});
      const url=URL.createObjectURL(blob);
      setPreviewUrl(url);
      setStep("pdfview");
      announce("Prévisualisation du PDF prête. Vous pouvez le consulter.");
    }catch(err){ setStatus("Erreur lors de la prévisualisation."); announce("Erreur de prévisualisation."); }
    setProcessing(false);
  };

  const generateFinalPdf = async()=>{
    if(!pdfBytes||!filledData) return;
    setProcessing(true); setStatus("Génération du document final..."); announce("Génération en cours.");
    try{
      const finalBytes=await buildPdfBytes();
      if(!finalBytes){ setStatus("Erreur de génération."); setProcessing(false); return; }
      const today=new Date().toISOString().split("T")[0];
      const baseName=(pdfFile.name||"formulaire").replace(/\.pdf$/i,"");
      const userName=`${activeProfile.lastName||""}${activeProfile.firstName?"_"+activeProfile.firstName:""}`.replace(/\s+/g,"_");
      const finalName=`${baseName}_${userName}_${today}.pdf`;
      const blob=new Blob([finalBytes],{type:"application/pdf"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a"); a.href=url; a.download=finalName; a.click();
      URL.revokeObjectURL(url);

      // Save to history
      const entry={
        id:Date.now(), date:new Date().toLocaleDateString("fr-FR"),
        fileName:finalName, summary:filledData.summary||"",
        fields:[...(filledData.filled||[]),...questions.map(q=>({field:q.field,value:answers[q.id]||"",source:"utilisateur"}))],
        needsSignature:filledData.needsSignature, needsLuApprouve:filledData.needsLuApprouve,
      };
      addHistory(entry);

      // Update profile with new answers
      const updated={...activeProfile};
      questions.forEach(q=>{ const m=PROFILE_FIELDS.find(f=>f.label.toLowerCase()===q.field.toLowerCase()); if(m&&answers[q.id]) updated[m.key]=answers[q.id]; });
      updateProfileAtIdx(activeIdx,updated);

      setStatus("✅ Document téléchargé !"); announce("Document final téléchargé avec succès."); setStep("done");
    }catch(err){ setStatus("Erreur lors de la génération. Réessayez."); announce("Erreur de génération."); console.error(err); }
    setProcessing(false);
  };

  return(
    <div style={s.container}>
      <LiveRegion msg={liveMsg}/>
      <Header title="Bipbip" back={{label:"← Accueil",action:()=>setView("home")}} navExtra={[{label:"Mon profil",action:()=>setView("profile")},{label:"Historique",action:()=>setView("history")}]}/>
      <main style={s.main}>
        {!activeProfile?(
          <div role="alert" style={s.alertWarn}><p>Aucun profil créé. <button style={s.linkBtn} onClick={()=>setView("profile")}>Créer mon profil</button></p></div>
        ):(
          <>
            {/* STEP 1 — Upload */}
            <section aria-labelledby="up-lbl" style={s.section}>
              <h2 id="up-lbl" style={s.h2}>1. Charger un formulaire PDF</h2>
              <p style={s.hint}>Profil actif : <strong>{activeProfile.firstName} {activeProfile.lastName}</strong></p>
              <label htmlFor="pdf-in" style={s.fileLabel}>Choisir un fichier PDF<input id="pdf-in" type="file" accept=".pdf" onChange={handlePdfUpload} style={s.fileInput}/></label>
              {pdfFile&&<p style={s.success} role="status">✓ {pdfFile.name} — {pdfType==="fields"?"Formulaire interactif":pdfType==="text"?"PDF texte":pdfType==="image"?"PDF image/scan":"PDF chargé"}</p>}
              {pdfWarning&&<p role="alert" style={s.alertWarn}>{pdfWarning}</p>}
            </section>

            {pdfFile&&step==="upload"&&(
              <section aria-labelledby="an-lbl" style={s.section}>
                <h2 id="an-lbl" style={s.h2}>2. Remplir le document</h2>
                <button style={s.btnPrimary} onClick={()=>analyze()} disabled={processing} aria-busy={processing}>
                  {processing?"Au boulot !...":"Au boulot !"}
                </button>
                {status&&<p role="status" style={s.statusMsg}>{status}</p>}
              </section>
            )}

            {/* STEP 2 — Questions */}
            {step==="questions"&&questions.length>0&&(
              <section aria-labelledby="q-lbl" style={s.section}>
                <h2 id="q-lbl" style={s.h2}>2. Questions complémentaires</h2>
                <p style={s.hint}>Répondez à chaque question. Vous pourrez modifier vos réponses avant validation.</p>
                {questions.map(q=>(
                  <fieldset key={q.id} style={s.fieldset}>
                    <legend style={s.legend}>{q.question}</legend>
                    {editingQ===q.id||!answers[q.id]?(
                      <>
                        {q.type==="radio"&&q.options?.length?(
                          q.options.map((opt,oi)=>(
                            <label key={oi} style={s.radioLabel}>
                              <input type="radio" name={q.id} value={opt} checked={answers[q.id]===opt} onChange={()=>setAnswers(a=>({...a,[q.id]:opt}))} style={s.radio}/>{opt}
                            </label>
                          ))
                        ):(
                          <input type="text" value={answers[q.id]||""} onChange={e=>setAnswers(a=>({...a,[q.id]:e.target.value}))} style={s.input} aria-required="true"/>
                        )}
                        {answers[q.id]&&<button style={{...s.btnSecondary,marginTop:8}} onClick={()=>setEditingQ(null)}>✓ Valider cette réponse</button>}
                      </>
                    ):(
                      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                        <span style={{fontSize:17}}><strong>{answers[q.id]}</strong></span>
                        <button style={s.btnSecondary} onClick={()=>setEditingQ(q.id)}>Modifier</button>
                      </div>
                    )}
                  </fieldset>
                ))}
                {allAnswered&&(
                  <button style={s.btnPrimary} onClick={goToPreview}>Voir la prévisualisation →</button>
                )}
                {status&&<p role="status" style={s.statusMsg}>{status}</p>}
              </section>
            )}

            {/* STEP 3 — Preview */}
            {step==="preview"&&filledData&&(
              <section aria-labelledby="pv-lbl" style={s.section}>
                <h2 id="pv-lbl" style={s.h2}>3. Vérification avant téléchargement</h2>
                <p style={s.hint}>{filledData.summary}</p>
                <p style={s.badge} role="status">
                  ✓ {filledData.filled?.length||0} champs &nbsp;|&nbsp;
                  {questions.length>0?`${questions.length} réponse(s) &nbsp;|&nbsp;`:""}
                  {filledData.needsSignature?"✎ Signature":"Pas de signature"} &nbsp;|&nbsp;
                  {filledData.needsLuApprouve?"📋 Lu et approuvé":""}
                </p>

                {/* Filled fields */}
                <h3 style={{fontSize:18,color:"#003366"}}>Champs remplis automatiquement</h3>
                <ul style={s.fieldList} aria-label="Champs remplis automatiquement">
                  {(filledData.filled||[]).map((f,i)=>(
                    <li key={i} style={s.fieldItem}><span style={s.fieldName}>{f.field} :</span><span>{f.value}</span></li>
                  ))}
                </ul>

                {/* Answers */}
                {questions.length>0&&(
                  <>
                    <h3 style={{fontSize:18,color:"#003366",marginTop:20}}>Vos réponses</h3>
                    <ul style={s.fieldList} aria-label="Vos réponses">
                      {questions.map(q=>(
                        <li key={q.id} style={{...s.fieldItem,flexWrap:"wrap",gap:8}}>
                          <span style={s.fieldName}>{q.field} :</span>
                          <span style={{flex:1}}>{answers[q.id]}</span>
                          <button style={s.btnSecondary} onClick={()=>{ setStep("questions"); setEditingQ(q.id); }}>Modifier</button>
                        </li>
                      ))}
                    </ul>
                  </>
                )}

                {/* Remarks */}
                <div style={{...s.formRow,marginTop:24}}>
                  <label htmlFor="remarks-in" style={s.label}>Remarques globales (optionnel) :</label>
                  <textarea id="remarks-in" value={remarks} onChange={e=>setRemarks(e.target.value)} rows={3} style={s.textarea} placeholder="Ex : Merci de mettre le texte en majuscules dans le champ nom, ou ajuster la position de la signature..."/>
                  <p style={s.hint}>Ces remarques seront transmises pour correction avant téléchargement.</p>
                </div>

                {remarks.trim()&&(
                  <button style={{...s.btnSecondary,marginBottom:16}} onClick={()=>{ analyze(remarks); setRemarks(""); }} disabled={processing}>
                    {processing?"Correction en cours...":"Envoyer les corrections à Bipbip"}
                  </button>
                )}

                <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:16}}>
                  <button style={s.btnSecondary} onClick={()=>setStep("questions")} disabled={questions.length===0}>← Modifier les réponses</button>
                  <button style={s.btnPrimary} onClick={showPreviewPdf} disabled={processing} aria-busy={processing}>
                    {processing?"Génération...":"👁 Voir le résultat"}
                  </button>
                </div>
                {status&&<p role="status" style={s.statusMsg}>{status}</p>}
              </section>
            )}

            {/* STEP 4 — PDF Preview fullscreen */}
            {step==="pdfview"&&previewUrl&&(
              <section aria-labelledby="pdfv-lbl" style={{...s.section,padding:0,border:"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px",background:"#f0f4f8",borderBottom:"2px solid #003366",flexWrap:"wrap"}}>
                  <h2 id="pdfv-lbl" style={{...s.h2,margin:0}}>👁 Prévisualisation du document</h2>
                  <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button style={s.btnSecondary} onClick={()=>setStep("preview")}>← Revenir aux corrections</button>
                    <button style={s.btnPrimary} onClick={generateFinalPdf} disabled={processing} aria-busy={processing}>
                      {processing?"Téléchargement...":"👍 Bon travail ! Télécharger"}
                    </button>
                  </div>
                </div>
                <p style={{...s.hint,padding:"8px 16px",margin:0}}>Vérifiez le document ci-dessous. Si vous voyez une erreur, cliquez sur "Revenir aux corrections".</p>
                <iframe
                  src={previewUrl}
                  title="Prévisualisation du formulaire rempli"
                  aria-label="Document PDF rempli — utilisez votre lecteur d'écran pour naviguer dans ce document"
                  style={{width:"100%",height:"80vh",border:"none",display:"block"}}
                />
                {status&&<p role="status" style={{...s.statusMsg,margin:"8px 16px"}}>{status}</p>}
              </section>
            )}

            {/* STEP 4 — Done */}
            {step==="done"&&(
              <section aria-labelledby="done-lbl" style={s.section}>
                <h2 id="done-lbl" style={s.h2}>✅ Document téléchargé !</h2>
                <p style={s.hint}>Votre document a été téléchargé sur votre appareil.</p>
                <button style={s.btnPrimary} onClick={()=>{ setPdfFile(null); setPdfBytes(null); setPdfText(""); setFilledData(null); setQuestions([]); setAnswers({}); setRemarks(""); setStep("upload"); setStatus(""); }}>
                  Remplir un nouveau formulaire
                </button>
                <button style={{...s.btnSecondary,marginLeft:12}} onClick={()=>setView("history")}>Voir l'historique</button>
              </section>
            )}
          </>
        )}
      </main>
    </div>
  );
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function HistoryView({history,setView,openPreview,liveMsg}){
  return(
    <div style={s.container}>
      <LiveRegion msg={liveMsg}/>
      <Header title="Historique" back={{label:"← Accueil",action:()=>setView("home")}}/>
      <main style={s.main}>
        {history.length===0?<p style={s.hint}>Aucun formulaire complété pour l'instant.</p>:(
          <ul style={s.fieldList} aria-label="Formulaires complétés">
            {history.map(h=>(
              <li key={h.id} style={{...s.fieldItem,flexDirection:"column",alignItems:"flex-start",gap:6}}>
                <strong>{h.fileName}</strong>
                <span style={s.hint}>{h.date} — {h.summary}</span>
                <span style={s.badge}>{h.fields?.length||0} champs remplis</span>
                <button style={s.btnSecondary} onClick={()=>openPreview(h)}>Voir le détail</button>
              </li>
            ))}
          </ul>
        )}
      </main>
    </div>
  );
}

// ─── PREVIEW ─────────────────────────────────────────────────────────────────
function PreviewView({entry,setView,liveMsg}){
  if(!entry) return(<div style={s.container}><Header title="Prévisualisation" back={{label:"← Accueil",action:()=>setView("home")}}/><main style={s.main}><p>Aucune donnée.</p></main></div>);
  return(
    <div style={s.container}>
      <LiveRegion msg={liveMsg}/>
      <Header title="Prévisualisation" back={{label:"← Accueil",action:()=>setView("home")}} navExtra={[{label:"Historique",action:()=>setView("history")}]}/>
      <main style={s.main}>
        <section aria-labelledby="pv-lbl" style={s.section}>
          <h2 id="pv-lbl" style={s.h2}>{entry.fileName}</h2>
          <p style={s.hint}>{entry.date} — {entry.summary}</p>
          <p style={s.badge} role="status">{entry.fields?.length||0} champs &nbsp;|&nbsp; {entry.needsSignature?"Signature placée":"Pas de signature"} &nbsp;|&nbsp; {entry.needsLuApprouve?"Lu et approuvé":""}</p>
          <table style={s.table} aria-label="Contenu du formulaire rempli">
            <caption style={s.srOnly}>Tous les champs remplis</caption>
            <thead><tr><th style={s.th} scope="col">Champ</th><th style={s.th} scope="col">Valeur</th><th style={s.th} scope="col">Source</th></tr></thead>
            <tbody>{(entry.fields||[]).map((f,i)=>(<tr key={i} style={i%2===0?s.trEven:{}}><td style={s.td}>{f.field}</td><td style={s.td}>{f.value}</td><td style={s.td}>{f.source}</td></tr>))}</tbody>
          </table>
        </section>
      </main>
    </div>
  );
}

// ─── SHARED ───────────────────────────────────────────────────────────────────
function LiveRegion({msg}){ return <div aria-live="polite" aria-atomic="true" style={s.srOnly}>{msg}</div>; }
function Header({title,subtitle,back,navExtra}){
  return(
    <header style={s.header}>
      <div><h1 style={s.h1}>{title}</h1>{subtitle&&<p style={s.subtitle}>{subtitle}</p>}</div>
      <nav style={s.nav} aria-label="Navigation">
        {back&&<button style={s.navBtn} onClick={back.action}>{back.label}</button>}
        {navExtra?.map(n=><button key={n.label} style={s.navBtn} onClick={n.action}>{n.label}</button>)}
      </nav>
    </header>
  );
}

const s={
  container:{fontFamily:"Arial, sans-serif",fontSize:"18px",lineHeight:1.6,color:"#1a1a1a",background:"#fff",minHeight:"100vh"},
  header:{background:"#003366",color:"#fff",padding:"16px 24px",display:"flex",flexWrap:"wrap",alignItems:"center",gap:16},
  h1:{margin:0,fontSize:"24px",color:"#fff"},
  subtitle:{margin:"4px 0 0",fontSize:"15px",color:"#cce0ff"},
  nav:{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"},
  navBtn:{background:"transparent",border:"2px solid #fff",color:"#fff",padding:"6px 14px",borderRadius:4,cursor:"pointer",fontSize:"16px"},
  main:{padding:"24px",maxWidth:800,margin:"0 auto"},
  section:{marginBottom:32,borderBottom:"1px solid #ddd",paddingBottom:24},
  h2:{fontSize:"20px",color:"#003366",marginBottom:12},
  hint:{color:"#555",fontSize:"16px",margin:"4px 0 12px"},
  label:{display:"block",fontWeight:"bold",marginBottom:6},
  input:{width:"100%",padding:"10px",fontSize:"16px",border:"2px solid #666",borderRadius:4,boxSizing:"border-box"},
  textarea:{width:"100%",padding:"10px",fontSize:"16px",border:"2px solid #666",borderRadius:4,boxSizing:"border-box",fontFamily:"inherit"},
  fileLabel:{display:"inline-block",padding:"10px 18px",background:"#f0f4f8",border:"2px solid #666",borderRadius:4,cursor:"pointer",fontSize:"16px"},
  fileInput:{position:"absolute",width:1,height:1,overflow:"hidden",clip:"rect(0,0,0,0)"},
  btnPrimary:{background:"#003366",color:"#fff",border:"none",padding:"12px 24px",fontSize:"18px",borderRadius:4,cursor:"pointer",marginTop:8},
  btnSecondary:{background:"#fff",color:"#003366",border:"2px solid #003366",padding:"10px 20px",fontSize:"16px",borderRadius:4,cursor:"pointer",marginTop:8},
  btnDisabled:{background:"#aaa",color:"#fff",border:"none",padding:"12px 24px",fontSize:"18px",borderRadius:4,cursor:"not-allowed",marginTop:8},
  linkBtn:{background:"none",border:"none",color:"#003366",textDecoration:"underline",cursor:"pointer",fontSize:"inherit"},
  success:{color:"#006600",fontWeight:"bold",margin:"8px 0"},
  errorMsg:{color:"#cc0000",fontWeight:"bold",margin:"8px 0",padding:"10px",background:"#fff0f0",border:"2px solid #cc0000",borderRadius:4},
  alertWarn:{background:"#fff3cd",border:"2px solid #856404",padding:"12px",borderRadius:4,color:"#856404",margin:"8px 0"},
  statusMsg:{background:"#e8f4fd",border:"1px solid #bee5eb",padding:"10px",borderRadius:4,marginTop:8},
  badge:{display:"inline-block",background:"#e8f0fe",color:"#003366",padding:"4px 12px",borderRadius:20,fontSize:"15px",marginBottom:12},
  fieldList:{listStyle:"none",padding:0,margin:0},
  fieldItem:{display:"flex",gap:8,padding:"10px 0",borderBottom:"1px solid #eee",alignItems:"center"},
  fieldName:{fontWeight:"bold",minWidth:180},
  fieldset:{border:"2px solid #666",borderRadius:4,padding:"12px 16px",marginBottom:16},
  legend:{fontWeight:"bold",fontSize:"17px",padding:"0 8px"},
  radioLabel:{display:"block",padding:"6px 0",cursor:"pointer"},
  radio:{marginRight:10,width:20,height:20},
  formRow:{marginBottom:16},
  homeNav:{display:"flex",flexDirection:"column",gap:16,maxWidth:400,margin:"32px auto"},
  homeBtn:{display:"flex",alignItems:"center",gap:16,padding:"20px 24px",fontSize:"20px",background:"#003366",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",width:"100%"},
  homeBtnIcon:{fontSize:"28px"},
  infoBox:{background:"#f0f7ff",border:"2px solid #003366",borderRadius:8,padding:"20px",marginBottom:24},
  link:{color:"#003366",fontWeight:"bold"},
  table:{width:"100%",borderCollapse:"collapse",marginTop:16},
  th:{background:"#003366",color:"#fff",padding:"10px 12px",textAlign:"left",fontSize:"16px"},
  td:{padding:"10px 12px",borderBottom:"1px solid #ddd",fontSize:"16px"},
  trEven:{background:"#f7f9fc"},
  srOnly:{position:"absolute",width:1,height:1,padding:0,margin:-1,overflow:"hidden",clip:"rect(0,0,0,0)",whiteSpace:"nowrap",border:0},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
