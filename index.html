<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bipbip – Secrétaire numérique</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{box-sizing:border-box}body{margin:0;padding:0;background:#fff;font-family:Arial,sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback} = React;

const PROFILE_FIELDS = [
  {key:"firstName",     label:"Prénom"},
  {key:"lastName",      label:"Nom"},
  {key:"gender",        label:"Genre",        type:"radio", options:["Masculin","Féminin","Autre","Non renseigné"]},
  {key:"civility",      label:"Civilité",     type:"radio", options:["M.","Mme","Mx","Aucune"]},
  {key:"birthDate",     label:"Date de naissance"},
  {key:"birthPlace",    label:"Lieu de naissance"},
  {key:"address",       label:"Adresse"},
  {key:"postalCode",    label:"Code postal"},
  {key:"city",          label:"Ville"},
  {key:"email",         label:"Email"},
  {key:"phone",         label:"Téléphone"},
  {key:"secu",          label:"Numéro de sécurité sociale"},
  {key:"nationality",   label:"Nationalité"},
  {key:"maritalStatus", label:"Situation familiale"},
];

function loadLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

const initState = {
  apiKey:    loadLS("bb_apikey",""),
  apiOk:     !!loadLS("bb_apikey",""),
  profiles:  loadLS("bb_profiles",[]),
  activeIdx: 0,
  history:   loadLS("bb_history",[]),
  view:      loadLS("bb_apikey","")?"home":"apikey",
  previewEntry: null,
};

function App(){
  const [app,setApp]   = useState(initState);
  const [live,setLive] = useState("");
  const say = useCallback(m=>{setLive("");setTimeout(()=>setLive(m),50);},[]);
  const go  = v=>setApp(a=>({...a,view:v}));

  const saveProfiles  = (profiles,idx)=>{saveLS("bb_profiles",profiles);setApp(a=>({...a,profiles,activeIdx:idx??a.activeIdx}));};
  const saveApiKey    = k=>{saveLS("bb_apikey",k);setApp(a=>({...a,apiKey:k,apiOk:true,view:a.profiles.length===0?"profile":"home"}));};
  const addHistory    = e=>setApp(a=>{const h=[e,...a.history];saveLS("bb_history",h);return{...a,history:h};});
  const updateProfile = (idx,p)=>setApp(a=>{const ps=[...a.profiles];ps[idx]=p;saveLS("bb_profiles",ps);return{...a,profiles:ps};});
  const openPreview   = e=>setApp(a=>({...a,view:"preview",previewEntry:e}));

  const {view,profiles,activeIdx,history,previewEntry,apiKey} = app;
  const activeProfile = profiles[activeIdx]||null;

  if(view==="apikey")  return <ApiKeyView onSave={saveApiKey} live={live} say={say}/>;
  if(view==="home")    return <HomeView go={go} profiles={profiles} activeIdx={activeIdx} setIdx={i=>setApp(a=>({...a,activeIdx:i}))} live={live} changeKey={()=>setApp(a=>({...a,view:"apikey",apiOk:false}))}/>;
  if(view==="profile") return <ProfileView profiles={profiles} activeIdx={activeIdx} saveProfiles={saveProfiles} go={go} live={live} say={say}/>;
  if(view==="history") return <HistoryView history={history} go={go} openPreview={openPreview} live={live}/>;
  if(view==="preview") return <PreviewView entry={previewEntry} go={go} live={live}/>;
  return <FormView profile={activeProfile} profileIdx={activeIdx} profiles={profiles} setIdx={i=>setApp(a=>({...a,activeIdx:i}))} apiKey={apiKey} go={go} updateProfile={updateProfile} addHistory={addHistory} live={live} say={say}/>;
}

// ─── API KEY ──────────────────────────────────────────────────────────────────
function ApiKeyView({onSave,live,say}){
  const [k,setK]      = useState("");
  const [err,setErr]  = useState("");
  const [busy,setBusy]= useState(false);

  const validate = async()=>{
    const t=k.trim();
    if(!t.startsWith("sk-ant-")){setErr("La clé doit commencer par sk-ant-...");say("Clé invalide.");return;}
    setBusy(true);setErr("");say("Vérification...");
    try{
      const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:t,messages:[{role:"user",content:"ok"}]})});
      if(r.ok){say("Clé validée !");onSave(t);}
      else{const e=await r.json().catch(()=>({}));setErr("Clé refusée : "+(e?.error?.message||"vérifiez qu'elle est correcte."));say("Clé refusée.");}
    }catch(err){setErr("Impossible de vérifier. Vérifiez votre connexion.");say("Erreur de connexion.");}
    setBusy(false);
  };

  return(
    <div style={s.page}><LR msg={live}/>
      <Hdr title="Bipbip" sub="Votre secrétaire numérique pour formulaires PDF"/>
      <main style={s.main}>
        <section aria-labelledby="ak-h" style={s.sec}>
          <h2 id="ak-h" style={s.h2}>Bienvenue !</h2>
          <p style={s.hint}>Pour fonctionner, cette application a besoin de votre clé API Anthropic personnelle. Elle reste uniquement sur votre appareil.</p>
          <div style={s.infoBox} role="note">
            <p style={{margin:"0 0 8px",fontWeight:"bold",fontSize:18}}>📋 Pas encore de clé API ?</p>
            <ol style={{margin:0,paddingLeft:22,lineHeight:2.2,fontSize:17}}>
              <li>Allez sur <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={s.lnk}>console.anthropic.com</a></li>
              <li>Créez un compte gratuit — bouton <strong>"Sign up"</strong></li>
              <li>Dans le menu à gauche, cliquez sur <strong>"API Keys"</strong></li>
              <li>Cliquez sur <strong>"Create Key"</strong>, nommez-la, copiez-la</li>
            </ol>
            <p style={{margin:"12px 0 0",fontSize:16}}>💡 <a href="https://www.anthropic.com/pricing" target="_blank" rel="noreferrer" style={s.lnk}>Voir les tarifs →</a></p>
          </div>
          <div style={s.row}>
            <label htmlFor="ak-in" style={s.lbl}>Collez votre clé API ici :</label>
            <input id="ak-in" type="password" value={k} onChange={e=>setK(e.target.value)} style={s.inp} placeholder="sk-ant-api03-..." autoComplete="off" aria-describedby="ak-hint ak-err"/>
            <p id="ak-hint" style={s.hint}>Stockée uniquement sur votre appareil.</p>
            {err&&<p id="ak-err" role="alert" style={s.errMsg}>{err}</p>}
          </div>
          <button style={k.trim()?s.btnP:s.btnD} onClick={validate} disabled={!k.trim()||busy} aria-busy={busy}>
            {busy?"Vérification...":"Valider ma clé et commencer"}
          </button>
        </section>
      </main>
    </div>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function HomeView({go,profiles,activeIdx,setIdx,live,changeKey}){
  return(
    <div style={s.page}><LR msg={live}/>
      <Hdr title="Bipbip" sub="Votre secrétaire numérique pour formulaires PDF"/>
      <main style={s.main}>
        <nav aria-label="Actions principales" style={s.homeNav}>
          {[{icon:"📄",lbl:"Remplir un formulaire",v:"form"},{icon:"👤",lbl:"Mon profil",v:"profile"},{icon:"📁",lbl:"Historique",v:"history"}].map(b=>(
            <button key={b.v} style={s.homeBtn} onClick={()=>go(b.v)}><span aria-hidden="true" style={s.homeBtnI}>{b.icon}</span>{b.lbl}</button>
          ))}
        </nav>
        {profiles.length>1&&(
          <section aria-labelledby="sw-h" style={s.sec}>
            <h2 id="sw-h" style={s.h2}>Profil actif</h2>
            <label htmlFor="p-sel" style={s.lbl}>Choisir un profil :</label>
            <select id="p-sel" value={activeIdx} onChange={e=>setIdx(Number(e.target.value))} style={s.inp}>
              {profiles.map((p,i)=><option key={p.id||i} value={i}>{p.civility||""} {p.firstName} {p.lastName}</option>)}
            </select>
          </section>
        )}
        <section style={{...s.sec,borderBottom:"none"}}>
          <button style={s.btnS} onClick={changeKey}>🔑 Changer ma clé API</button>
        </section>
      </main>
    </div>
  );
}

// ─── PROFILE ─────────────────────────────────────────────────────────────────
function ProfileView({profiles,activeIdx,saveProfiles,go,live,say}){
  const [idx,setIdx] = useState(activeIdx);
  const [form,setF]  = useState(()=>profiles[activeIdx]?{...profiles[activeIdx]}:{id:Date.now()});
  const isNew = idx>=profiles.length;
  const set   = (k,v)=>setF(f=>({...f,[k]:v}));

  const save=()=>{
    const u=[...profiles];
    if(isNew) u.push(form); else u[idx]=form;
    saveProfiles(u,isNew?u.length-1:idx);
    if(isNew) setIdx(u.length-1);
    say("Profil sauvegardé.");
  };

  const del=()=>{
    if(profiles.length<=1){say("Impossible de supprimer le seul profil.");return;}
    const u=profiles.filter((_,i)=>i!==idx);
    saveProfiles(u,0);
    setIdx(0);setF({...u[0]});
    say("Profil supprimé.");
  };

  const handleSig=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{set("signature",ev.target.result);set("sigName",f.name);say("Signature chargée.");};
    r.readAsDataURL(f);
  };

  return(
    <div style={s.page}><LR msg={live}/>
      <Hdr title="Mon profil" back={{lbl:"← Accueil",fn:()=>go("home")}}/>
      <main style={s.main}>
        {profiles.length>0&&(
          <section aria-labelledby="sel-h" style={s.sec}>
            <h2 id="sel-h" style={s.h2}>Profils enregistrés</h2>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {profiles.map((p,i)=>(
                <button key={p.id||i} style={idx===i&&!isNew?s.btnP:s.btnS} onClick={()=>{setIdx(i);setF({...profiles[i]});}}>
                  {p.civility||""} {p.firstName||"Sans nom"} {p.lastName}
                </button>
              ))}
              <button style={s.btnS} onClick={()=>{setIdx(profiles.length);setF({id:Date.now()});}}>+ Nouveau profil</button>
            </div>
          </section>
        )}
        <section aria-labelledby="ed-h" style={s.sec}>
          <h2 id="ed-h" style={s.h2}>{isNew?"Nouveau profil":"Modifier le profil"}</h2>
          {PROFILE_FIELDS.map(f=>(
            <div key={f.key} style={s.row}>
              <label htmlFor={`pf-${f.key}`} style={s.lbl}>{f.label}</label>
              {f.type==="radio"?(
                <div role="group" aria-labelledby={`pf-${f.key}`} style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:4}}>
                  {f.options.map(opt=>(
                    <label key={opt} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:17}}>
                      <input type="radio" name={`pf-${f.key}`} value={opt} checked={form[f.key]===opt} onChange={()=>set(f.key,opt)} style={s.rad}/>
                      {opt}
                    </label>
                  ))}
                </div>
              ):(
                <input id={`pf-${f.key}`} type="text" value={form[f.key]||""} onChange={e=>set(f.key,e.target.value)} style={s.inp}/>
              )}
            </div>
          ))}
          <div style={s.row}>
            <label htmlFor="sig-up" style={s.lbl}>Signature (PNG ou JPG)</label>
            <label htmlFor="sig-up" style={s.fileBtn}>Choisir ma signature<input id="sig-up" type="file" accept="image/*" onChange={handleSig} style={s.fileHide}/></label>
            {form.sigName&&<p style={s.ok}>✓ {form.sigName}</p>}
            {form.signature&&<img src={form.signature} alt="Aperçu signature" style={{maxHeight:60,marginTop:8,border:"1px solid #ccc",display:"block"}}/>}
          </div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:8}}>
            <button style={s.btnP} onClick={save}>Enregistrer le profil</button>
            {!isNew&&profiles.length>1&&<button style={{...s.btnS,color:"#cc0000",border:"2px solid #cc0000"}} onClick={del}>Supprimer ce profil</button>}
          </div>
        </section>
      </main>
    </div>
  );
}

// ─── FORM ─────────────────────────────────────────────────────────────────────
function FormView({profile,profileIdx,profiles,setIdx,apiKey,go,updateProfile,addHistory,live,say}){
  const [step,setStep]         = useState("upload");
  const [pdfFile,setPdfFile]   = useState(null);
  const [pdfBytes,setPdfBytes] = useState(null);
  const [pdfText,setPdfText]   = useState("");
  const [pdfType,setPdfType]   = useState("");
  const [busy,setBusy]         = useState(false);
  const [status,setStatus]     = useState("");
  const [analysisData,setAD]   = useState(null);
  const [qAnswers,setQA]       = useState({});
  const [synthesis,setSynth]   = useState([]);
  const [remarks,setRemarks]   = useState("");

  const loadPdfLib = async()=>{
    if(!window.PDFLib) await new Promise((res,rej)=>{const sc=document.createElement("script");sc.src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js";sc.onload=res;sc.onerror=rej;document.head.appendChild(sc);});
    return window.PDFLib;
  };
  const loadPdfJs = async()=>{
    if(!window.pdfjsLib){
      await new Promise((res,rej)=>{const sc=document.createElement("script");sc.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";sc.onload=res;sc.onerror=rej;document.head.appendChild(sc);});
      window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
    return window.pdfjsLib;
  };

  const handleUpload = async e=>{
    const file=e.target.files[0];if(!file)return;
    setPdfFile(file);setPdfBytes(null);setPdfText("");setPdfType("");setAD(null);setQA({});setSynth([]);setRemarks("");setStep("upload");setStatus("Lecture...");say("Lecture du PDF.");
    const reader=new FileReader();
    reader.onload=async ev=>{
      const bytes=new Uint8Array(ev.target.result);
      setPdfBytes(Array.from(bytes));
      try{
        const PL=await loadPdfLib();
        const doc=await PL.PDFDocument.load(bytes.buffer.slice(bytes.byteOffset,bytes.byteOffset+bytes.byteLength),{ignoreEncryption:true});
        const fields=doc.getForm().getFields();
        if(fields.length>0){setPdfType("fields");setStatus(`Formulaire interactif — ${fields.length} champ(s).`);say("Formulaire interactif détecté.");}
        else{
          const pj=await loadPdfJs();
          const pd=await pj.getDocument({data:bytes}).promise;
          let txt="";
          for(let i=1;i<=pd.numPages;i++){const pg=await pd.getPage(i);const c=await pg.getTextContent();txt+=c.items.map(it=>it.str).join(" ")+"\n";}
          txt=txt.trim();
          if(txt.length>50){setPdfType("text");setPdfText(txt);setStatus("PDF texte — prêt.");say("PDF texte détecté.");}
          else{setPdfType("image");setStatus("PDF image/scan — prêt.");say("PDF image détecté.");}
        }
      }catch{setPdfType("unknown");setStatus("PDF chargé.");}
    };
    reader.readAsArrayBuffer(file);
  };

  const callClaude = async messages=>{
    const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey,messages})});
    const d=await r.json();
    return d.content?.map(b=>b.text||"").join("")||"";
  };

  const analyze = async()=>{
    if(!pdfFile||!profile)return;
    setBusy(true);setStatus("Au boulot !...");say("Analyse en cours.");
    const profileStr=PROFILE_FIELDS.map(f=>`${f.label}: ${profile[f.key]||"(non renseigné)"}`).join("\n");
    const prompt=`Tu es une secrétaire aidant une personne non-voyante à remplir un formulaire.

PROFIL :
${profileStr}

FORMULAIRE (texte extrait) :
${pdfText||"PDF image — identifie les zones de saisie visuellement."}

RÈGLES STRICTES :
- Ne calcule JAMAIS une valeur dérivée (ne calcule pas l'âge, ne déduis pas le genre depuis la civilité, etc.)
- Utilise UNIQUEMENT les valeurs textuelles exactes du profil pour "filled"
- Si une info n'est pas explicitement dans le profil, mets-la dans "questions"
- Détecte la langue et utilise-la pour les questions et le texte "lu et approuvé"
- x,y sont les coordonnées en points PDF (origine bas-gauche), null si inconnu

Réponds UNIQUEMENT en JSON valide sans markdown :
{
  "language":"fr",
  "summary":"résumé court",
  "filled":[{"field":"nom exact","value":"valeur exacte du profil","page":1,"x":null,"y":null}],
  "questions":[{"id":"q1","field":"nom du champ","question":"question claire","type":"text","options":[]}],
  "needsSignature":true,
  "signaturePos":{"page":1,"x":400,"y":150},
  "needsLuApprouve":true,
  "luApprouvePos":{"page":1,"x":400,"y":120},
  "luApprouveText":"Lu et approuvé"
}
"type"="radio" pour choix multiples (options rempli), "text" pour champ libre (options:[]).`;

    try{
      const raw=await callClaude([{role:"user",content:prompt}]);
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setAD(parsed);
      if((parsed.questions||[]).length>0){setStep("questions");say(`${parsed.questions.length} question(s) à répondre.`);}
      else{buildSynthesis(parsed,{});setStep("synthesis");say("Synthèse prête.");}
    }catch(e){setStatus(`Erreur d'analyse : ${e.message}`);say("Erreur.");}
    setBusy(false);
  };

  const buildSynthesis=(data,answers)=>{
    const rows=[
      ...(data.filled||[]).map(f=>({field:f.field,value:f.value,page:f.page,x:f.x,y:f.y,source:"profil"})),
      ...(data.questions||[]).map(q=>({field:q.field,value:answers[q.id]||"",page:1,x:null,y:null,source:"utilisateur"})),
    ];
    setSynth(rows);
    setStep("synthesis");
    say("Synthèse prête. Vérifiez les informations.");
  };

  const allQAnswered = analysisData?(analysisData.questions||[]).every(q=>(qAnswers[q.id]||"").trim()!==""):true;

  const generateAndDownload = async()=>{
    if(!pdfBytes||!analysisData)return;
    setBusy(true);setStatus("Génération du document...");say("Génération en cours.");
    try{
      const PL=await loadPdfLib();
      const {PDFDocument,rgb,StandardFonts}=PL;
      const buffer=new Uint8Array(pdfBytes).buffer;
      const pdfDoc=await PDFDocument.load(buffer,{ignoreEncryption:true,updateMetadata:false});
      const font=await pdfDoc.embedFont(StandardFonts.Helvetica);
      const pages=pdfDoc.getPages();

      if(pdfType==="fields"){
        try{
          const form=pdfDoc.getForm();
          for(const row of synthesis){
            if(!row.value)continue;
            try{form.getTextField(row.field).setText(row.value);}
            catch{
              const all=form.getFields();
              const m=all.find(f=>f.getName().toLowerCase().includes(row.field.toLowerCase().substring(0,6)));
              if(m)try{m.setText(row.value);}catch{}
            }
          }
        }catch{}
      } else {
        for(const row of synthesis){
          if(!row.value||row.x===null)continue;
          const pg=pages[Math.max(0,(row.page||1)-1)];
          if(!pg)continue;
          const {height}=pg.getSize();
          try{pg.drawText(String(row.value).substring(0,80),{x:row.x,y:height-(row.y||100),size:10,font,color:rgb(0,0,0)});}catch{}
        }
      }

      if(analysisData.needsLuApprouve){
        const lp=analysisData.luApprouvePos;
        const pg=pages[Math.max(0,(lp?.page||1)-1)];
        if(pg){
          const {height}=pg.getSize();
          try{pg.drawText(analysisData.luApprouveText||"Lu et approuvé",{x:lp?.x||50,y:lp?.y??(height-720),size:11,font,color:rgb(0,0,0)});}catch{}
        }
      }

      if(analysisData.needsSignature&&profile?.signature){
        try{
          const sigBase64=profile.signature.split(",")[1];
          if(sigBase64){
            const sb=Uint8Array.from(atob(sigBase64),c=>c.charCodeAt(0));
            const mime=(profile.signature.match(/data:(image\/\w+);/)||[])[1]||"image/png";
            const si=mime.includes("jp")?await pdfDoc.embedJpg(sb):await pdfDoc.embedPng(sb);
            const sp=analysisData.signaturePos;
            const pg=pages[Math.max(0,(sp?.page||1)-1)];
            if(pg){
              const {height}=pg.getSize();
              const d=si.scale(0.25);
              pg.drawImage(si,{x:sp?.x||400,y:sp?.y??(height-720),width:d.width,height:d.height});
            }
          }
        }catch(sigErr){console.warn("Signature:",sigErr);}
      }

      const today=new Date().toISOString().split("T")[0];
      const base=(pdfFile.name||"formulaire").replace(/\.pdf$/i,"");
      const uname=`${(profile.lastName||"").replace(/\s/g,"_")}_${(profile.firstName||"").replace(/\s/g,"_")}`;
      const fname=`${base}_${uname}_${today}.pdf`;

      const finalBytes=await pdfDoc.save();
      const url=URL.createObjectURL(new Blob([finalBytes],{type:"application/pdf"}));
      const a=document.createElement("a");a.href=url;a.download=fname;a.click();
      URL.revokeObjectURL(url);

      const updated={...profile};
      (analysisData.questions||[]).forEach(q=>{const m=PROFILE_FIELDS.find(f=>f.label.toLowerCase()===q.field.toLowerCase());if(m&&qAnswers[q.id])updated[m.key]=qAnswers[q.id];});
      updateProfile(profileIdx,updated);
      addHistory({id:Date.now(),date:new Date().toLocaleDateString("fr-FR"),fileName:fname,summary:analysisData.summary||"",fields:synthesis});
      setStep("done");say("Document téléchargé !");
    }catch(err){setStatus(`Erreur : ${err.message}`);say("Erreur de génération.");console.error(err);}
    setBusy(false);
  };

  const reset=()=>{setPdfFile(null);setPdfBytes(null);setPdfText("");setPdfType("");setAD(null);setQA({});setSynth([]);setRemarks("");setStep("upload");setStatus("");};

  return(
    <div style={s.page}><LR msg={live}/>
      <Hdr title="Bipbip" back={{lbl:"← Accueil",fn:()=>go("home")}} extra={[{lbl:"Mon profil",fn:()=>go("profile")},{lbl:"Historique",fn:()=>go("history")}]}/>
      <main style={s.main}>
        {!profile?(
          <div role="alert" style={s.warn}><p>Aucun profil. <button style={s.lnkBtn} onClick={()=>go("profile")}>Créer mon profil</button></p></div>
        ):(
          <>
            {/* ── ÉTAPE 1 : Upload + choix profil ── */}
            <section aria-labelledby="e1-h" style={s.sec}>
              <h2 id="e1-h" style={s.h2}>1. Charger un formulaire PDF</h2>

              {/* Sélecteur de profil */}
              {profiles.length>1&&(
                <div style={{...s.row,background:"#f0f7ff",border:"2px solid #003366",borderRadius:8,padding:"12px 16px",marginBottom:16}}>
                  <label htmlFor="form-p-sel" style={s.lbl}>Profil actif :</label>
                  <select id="form-p-sel" value={profileIdx} onChange={e=>setIdx(Number(e.target.value))} style={s.inp} aria-describedby="form-p-hint">
                    {profiles.map((p,i)=><option key={p.id||i} value={i}>{p.civility||""} {p.firstName} {p.lastName}</option>)}
                  </select>
                  <p id="form-p-hint" style={s.hint}>Changez de profil si vous remplissez pour quelqu'un d'autre.</p>
                </div>
              )}
              {profiles.length===1&&<p style={s.hint}>Profil actif : <strong>{profile.civility||""} {profile.firstName} {profile.lastName}</strong></p>}

              <label htmlFor="pdf-in" style={s.fileBtn}>Choisir un fichier PDF<input id="pdf-in" type="file" accept=".pdf" onChange={handleUpload} style={s.fileHide}/></label>
              {pdfFile&&<p style={s.ok} role="status">✓ {pdfFile.name} — {pdfType==="fields"?"Formulaire interactif":pdfType==="text"?"PDF texte":pdfType==="image"?"PDF image/scan":"PDF chargé"}</p>}
            </section>

            {pdfFile&&step==="upload"&&(
              <section aria-labelledby="e2-h" style={s.sec}>
                <h2 id="e2-h" style={s.h2}>2. Remplir le document</h2>
                <button style={s.btnP} onClick={analyze} disabled={busy} aria-busy={busy}>{busy?"Au boulot !...":"Au boulot !"}</button>
                {status&&<p role="status" style={s.statusBox}>{status}</p>}
              </section>
            )}

            {/* ── ÉTAPE 3 : Questions manquantes ── */}
            {step==="questions"&&analysisData&&(
              <section aria-labelledby="e3-h" style={s.sec}>
                <h2 id="e3-h" style={s.h2}>3. Informations manquantes</h2>
                <p style={s.hint}>Ces informations ne figurent pas dans votre profil. Veuillez les renseigner.</p>
                {(analysisData.questions||[]).map(q=>(
                  <fieldset key={q.id} style={s.fset}>
                    <legend style={s.leg}>{q.question}</legend>
                    {q.type==="radio"&&q.options?.length?(
                      q.options.map((opt,i)=>(
                        <label key={i} style={s.radLbl}>
                          <input type="radio" name={q.id} value={opt} checked={qAnswers[q.id]===opt} onChange={()=>setQA(a=>({...a,[q.id]:opt}))} style={s.rad}/>{opt}
                        </label>
                      ))
                    ):(
                      <input type="text" value={qAnswers[q.id]||""} onChange={e=>setQA(a=>({...a,[q.id]:e.target.value}))} style={s.inp} aria-required="true"/>
                    )}
                  </fieldset>
                ))}
                <button style={allQAnswered?s.btnP:s.btnD} onClick={()=>buildSynthesis(analysisData,qAnswers)} disabled={!allQAnswered}>
                  Suivant →
                </button>
                {status&&<p role="status" style={s.statusBox}>{status}</p>}
              </section>
            )}

            {/* ── ÉTAPE 4 : Synthèse + remarques + téléchargement ── */}
            {step==="synthesis"&&(
              <section aria-labelledby="e4-h" style={s.sec}>
                <h2 id="e4-h" style={s.h2}>4. Vérification et téléchargement</h2>
                <p style={s.hint}>Vérifiez et corrigez les informations si nécessaire, puis téléchargez.</p>

                <table style={s.tbl} aria-label="Informations à insérer dans le formulaire">
                  <caption style={s.srOnly}>Toutes les informations prêtes à être insérées</caption>
                  <thead><tr><th style={s.th} scope="col">Champ</th><th style={s.th} scope="col">Valeur</th><th style={s.th} scope="col">Source</th></tr></thead>
                  <tbody>
                    {synthesis.map((row,i)=>(
                      <tr key={i} style={i%2===0?s.trE:{}}>
                        <td style={s.td}>{row.field}</td>
                        <td style={s.td}>
                          <input type="text" value={row.value} onChange={e=>{const ns=[...synthesis];ns[i]={...ns[i],value:e.target.value};setSynth(ns);}}
                            style={{...s.inp,marginBottom:0,border:"1px solid #aaa",padding:"6px 8px",fontSize:16}} aria-label={`Valeur pour ${row.field}`}/>
                        </td>
                        <td style={s.td}>{row.source}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>

                {/* Remarques / corrections */}
                <div style={{...s.row,marginTop:24,background:"#f0f7ff",border:"2px solid #003366",borderRadius:8,padding:"16px"}}>
                  <label htmlFor="remarks-in" style={s.lbl}>💬 Remarques ou corrections à adresser (optionnel) :</label>
                  <textarea id="remarks-in" value={remarks} onChange={e=>setRemarks(e.target.value)} rows={3} style={s.ta}
                    placeholder="Ex : Mettre la signature en bas à droite, écrire le nom en majuscules, placer 'Lu et approuvé' après la signature..."/>
                  <p style={s.hint}>Ces remarques guideront la mise en page du document généré.</p>
                </div>

                <div style={{display:"flex",gap:12,marginTop:16,flexWrap:"wrap"}}>
                  <button style={s.btnS} onClick={()=>setStep("questions")} disabled={(analysisData?.questions||[]).length===0}>← Modifier les réponses</button>
                  <button style={s.btnP} onClick={generateAndDownload} disabled={busy} aria-busy={busy}>
                    {busy?"Génération...":"Télécharger le PDF"}
                  </button>
                </div>
                {status&&<p role="status" style={s.statusBox}>{status}</p>}
              </section>
            )}

            {/* ── DONE ── */}
            {step==="done"&&(
              <section aria-labelledby="done-h" style={s.sec}>
                <h2 id="done-h" style={s.h2}>✅ Document téléchargé !</h2>
                <p style={s.hint}>Votre document a été téléchargé sur votre appareil.</p>
                <button style={s.btnP} onClick={reset}>Remplir un nouveau formulaire</button>
                <button style={{...s.btnS,marginLeft:12}} onClick={()=>go("history")}>Voir l'historique</button>
              </section>
            )}
          </>
        )}
      </main>
    </div>
  );
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function HistoryView({history,go,openPreview,live}){
  return(
    <div style={s.page}><LR msg={live}/>
      <Hdr title="Historique" back={{lbl:"← Accueil",fn:()=>go("home")}}/>
      <main style={s.main}>
        {history.length===0?<p style={s.hint}>Aucun formulaire complété pour l'instant.</p>:(
          <ul style={s.ul} aria-label="Formulaires complétés">
            {history.map(h=>(
              <li key={h.id} style={{...s.li,flexDirection:"column",alignItems:"flex-start",gap:6}}>
                <strong>{h.fileName}</strong>
                <span style={s.hint}>{h.date} — {h.summary}</span>
                <span style={s.badge}>{h.fields?.length||0} champs</span>
                <button style={s.btnS} onClick={()=>openPreview(h)}>Voir le détail</button>
              </li>
            ))}
          </ul>
        )}
      </main>
    </div>
  );
}

// ─── PREVIEW ─────────────────────────────────────────────────────────────────
function PreviewView({entry,go,live}){
  if(!entry)return(<div style={s.page}><Hdr title="Détail" back={{lbl:"← Accueil",fn:()=>go("home")}}/><main style={s.main}><p>Aucune donnée.</p></main></div>);
  return(
    <div style={s.page}><LR msg={live}/>
      <Hdr title="Détail du formulaire" back={{lbl:"← Accueil",fn:()=>go("home")}} extra={[{lbl:"Historique",fn:()=>go("history")}]}/>
      <main style={s.main}>
        <section aria-labelledby="pv-h" style={s.sec}>
          <h2 id="pv-h" style={s.h2}>{entry.fileName}</h2>
          <p style={s.hint}>{entry.date} — {entry.summary}</p>
          <table style={s.tbl} aria-label="Champs remplis">
            <caption style={s.srOnly}>Tous les champs remplis</caption>
            <thead><tr><th style={s.th} scope="col">Champ</th><th style={s.th} scope="col">Valeur</th><th style={s.th} scope="col">Source</th></tr></thead>
            <tbody>{(entry.fields||[]).map((f,i)=>(<tr key={i} style={i%2===0?s.trE:{}}><td style={s.td}>{f.field}</td><td style={s.td}>{f.value}</td><td style={s.td}>{f.source}</td></tr>))}</tbody>
          </table>
        </section>
      </main>
    </div>
  );
}

// ─── SHARED ───────────────────────────────────────────────────────────────────
function LR({msg}){return <div aria-live="polite" aria-atomic="true" style={s.srOnly}>{msg}</div>;}
function Hdr({title,sub,back,extra}){
  return(
    <header style={s.hdr}>
      <div><h1 style={s.h1}>{title}</h1>{sub&&<p style={s.sub}>{sub}</p>}</div>
      <nav style={s.nav} aria-label="Navigation">
        {back&&<button style={s.navBtn} onClick={back.fn}>{back.lbl}</button>}
        {extra?.map(n=><button key={n.lbl} style={s.navBtn} onClick={n.fn}>{n.lbl}</button>)}
      </nav>
    </header>
  );
}

const s={
  page:{fontFamily:"Arial,sans-serif",fontSize:"18px",lineHeight:1.6,color:"#1a1a1a",background:"#fff",minHeight:"100vh"},
  hdr:{background:"#003366",color:"#fff",padding:"16px 24px",display:"flex",flexWrap:"wrap",alignItems:"center",gap:16},
  h1:{margin:0,fontSize:"24px",color:"#fff"},
  sub:{margin:"4px 0 0",fontSize:"15px",color:"#cce0ff"},
  nav:{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap"},
  navBtn:{background:"transparent",border:"2px solid #fff",color:"#fff",padding:"6px 14px",borderRadius:4,cursor:"pointer",fontSize:"16px"},
  main:{padding:"24px",maxWidth:800,margin:"0 auto"},
  sec:{marginBottom:32,borderBottom:"1px solid #ddd",paddingBottom:24},
  h2:{fontSize:"20px",color:"#003366",marginBottom:12},
  hint:{color:"#555",fontSize:"16px",margin:"4px 0 12px"},
  lbl:{display:"block",fontWeight:"bold",marginBottom:6},
  inp:{width:"100%",padding:"10px",fontSize:"16px",border:"2px solid #666",borderRadius:4,boxSizing:"border-box"},
  ta:{width:"100%",padding:"10px",fontSize:"16px",border:"2px solid #666",borderRadius:4,boxSizing:"border-box",fontFamily:"inherit"},
  fileBtn:{display:"inline-block",padding:"10px 18px",background:"#f0f4f8",border:"2px solid #666",borderRadius:4,cursor:"pointer",fontSize:"16px"},
  fileHide:{position:"absolute",width:1,height:1,overflow:"hidden",clip:"rect(0,0,0,0)"},
  btnP:{background:"#003366",color:"#fff",border:"none",padding:"12px 24px",fontSize:"18px",borderRadius:4,cursor:"pointer",marginTop:8},
  btnS:{background:"#fff",color:"#003366",border:"2px solid #003366",padding:"10px 20px",fontSize:"16px",borderRadius:4,cursor:"pointer",marginTop:8},
  btnD:{background:"#aaa",color:"#fff",border:"none",padding:"12px 24px",fontSize:"18px",borderRadius:4,cursor:"not-allowed",marginTop:8},
  lnkBtn:{background:"none",border:"none",color:"#003366",textDecoration:"underline",cursor:"pointer",fontSize:"inherit"},
  ok:{color:"#006600",fontWeight:"bold",margin:"8px 0"},
  errMsg:{color:"#cc0000",fontWeight:"bold",margin:"8px 0",padding:"10px",background:"#fff0f0",border:"2px solid #cc0000",borderRadius:4},
  warn:{background:"#fff3cd",border:"2px solid #856404",padding:"12px",borderRadius:4,color:"#856404",margin:"8px 0"},
  statusBox:{background:"#e8f4fd",border:"1px solid #bee5eb",padding:"10px",borderRadius:4,marginTop:8},
  badge:{display:"inline-block",background:"#e8f0fe",color:"#003366",padding:"4px 12px",borderRadius:20,fontSize:"15px"},
  ul:{listStyle:"none",padding:0,margin:0},
  li:{display:"flex",gap:8,padding:"10px 0",borderBottom:"1px solid #eee",alignItems:"center"},
  fset:{border:"2px solid #666",borderRadius:4,padding:"12px 16px",marginBottom:16},
  leg:{fontWeight:"bold",fontSize:"17px",padding:"0 8px"},
  radLbl:{display:"block",padding:"6px 0",cursor:"pointer"},
  rad:{marginRight:10,width:20,height:20},
  row:{marginBottom:16},
  homeNav:{display:"flex",flexDirection:"column",gap:16,maxWidth:400,margin:"32px auto"},
  homeBtn:{display:"flex",alignItems:"center",gap:16,padding:"20px 24px",fontSize:"20px",background:"#003366",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",width:"100%"},
  homeBtnI:{fontSize:"28px"},
  infoBox:{background:"#f0f7ff",border:"2px solid #003366",borderRadius:8,padding:"20px",marginBottom:24},
  lnk:{color:"#003366",fontWeight:"bold"},
  tbl:{width:"100%",borderCollapse:"collapse",marginTop:16},
  th:{background:"#003366",color:"#fff",padding:"10px 12px",textAlign:"left",fontSize:"16px"},
  td:{padding:"10px 12px",borderBottom:"1px solid #ddd",fontSize:"16px"},
  trE:{background:"#f7f9fc"},
  srOnly:{position:"absolute",width:1,height:1,padding:0,margin:-1,overflow:"hidden",clip:"rect(0,0,0,0)",whiteSpace:"nowrap",border:0},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
